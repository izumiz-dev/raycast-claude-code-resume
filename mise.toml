# ─────────────────────────────────────────────────────────────
# Strictly pin the Raycast extension's build environment.
# `cd` into this directory and the tools/env below take effect automatically.
# ─────────────────────────────────────────────────────────────

# Require the minimum mise version that can handle this file
min_version = "2025.1.0"

[settings]
# Generate mise.lock to lock exact tool versions/hashes (strict)
lockfile = true
# Ignore loose version files like .nvmrc; this file is the single source of truth
idiomatic_version_file_enable_tools = []
# Suppress auto-installing unknown/unpinned tools
not_found_auto_install = false

[tools]
# Use the latest LTS release; npm is bundled with Node.
node = "lts"

[env]
NODE_ENV = "development"
# Put local deps (ray, tsc, etc.) on PATH so mise tasks can call them by bare name
_.path = ["{{config_root}}/node_modules/.bin"]

# ───────────────────────── tasks (build commands consolidated in mise) ─────────────────────────

[tasks.install]
description = "Resolve dependencies (npm install)"
run = "npm install"

[tasks.clean]
description = "Remove node_modules (OS-independent; scripts/clean.mjs; keeps package-lock.json)"
run = "node scripts/clean.mjs"

[tasks.build]
description = "Build the Raycast extension (includes type checking)"
run = "npm run build"

[tasks.dev]
description = "Load into Raycast in development mode"
run = "npm run dev"

[tasks.lint]
description = "Lint"
run = "npm run lint"

[tasks.reset]
description = "Full reset → reinstall → build (run in sequence)"
run = ["node scripts/clean.mjs", "npm install", "npm run build"]

# Array form (not a multiline script) so each line also runs under Windows' default cmd /c
[tasks.doctor]
description = "Check the environment (node/npm/ray versions)"
run = [
  "node -v",
  "npm -v",
  "npm exec -- ray --version || echo ray becomes available after npm install",
]
